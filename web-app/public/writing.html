<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title"></title>
    <link rel="stylesheet" href="css/session.css">
</head>
<body>
    <section>
        <h2 id="story_title"></h2>

        <div class="prompt-row">
            <h3 id="story_prompt"></h3>
            <button id="regenerate_prompt" type="button">Regenerate</button>
        </div>

        <textarea id="story_editor" placeholder="You may begin writing..."></textarea>

        <div class="actions">
            <button id="exit_session">Exit</button>
            <button id="save_story">Save</button>
            <span id="save_status"></span>
            <button id="download_story">Download</button>
        </div>
    </section>

    <script src="js/story_manager.js"></script>
    <script src="js/writing.js"></script>
</body>
</html>
