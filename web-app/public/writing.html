<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title"></title>
    <link rel="stylesheet" href="css/story_editor.css">
</head>
<body>
    <section>
        <h2 id="story_title" contenteditable="true"></h2>

        <div class="prompt-row">
            <h3 id="story_prompt"></h3>
            <button id="regenerate_prompt" type="button" title="Prompt is locked once you begin writing.">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6"/>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    <path d="M3 22v-6h6"/>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
            </button>
        </div>

        <textarea id="story_editor" placeholder="You may begin writing..."></textarea>

        <div class="actions">
            <button id="exit_session">Exit</button>
            <button id="save_story">Save</button>
            <span id="save_status"></span>
            
            <div class="download">
                <button id="download_story">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                </button>

                <div id="download_menu">
                    <button id="txt_download">TXT</button>
                    <button id="pdf_download">PDF</button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="module" src="js/writing.js"></script>
</body>
</html>
