<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Name]</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <main class="home">
        <section>
            <h1> [Name]</h1>
            <p>A place where stories find their rhythm—whether you write alone or let your voice intertwine with others, [Name] invites imagination to wander, return, and grow.</p>
            <label for="username"> Username: </label>
            <input type="text" id="username" name="username" required minlength="1" maxlength="64"/>
        </section>

        <section>
            <h2>New Story</h2>
            <form>
                <label for="session_name"> Story Title: </label>
                <input type="text" id="session_name" name="session_name" required minlength="1" maxlength="64"/>
                <select name="genre" id="genre_select">
                    <option value=""> --Select a genre--</option>
                </select>
                <button type="button" id="create_session">Create</button>
            </form>
        </section>

        <section>
            <h3>Your Stories</h3>
            <ul id="stories_list"></ul>
        </section>

        <section>
            <h3>Collaborative Stories</h3>
            <ul id="sessions_list"></ul>
        </section>
    </main>

    <script src="js/story_manager.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
