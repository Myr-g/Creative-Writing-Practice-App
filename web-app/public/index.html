<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Name]</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <main class="home">
        <section>
            <h1> [Name]</h1>
            <p>A place where stories find their rhythm—whether you write alone or let your voice intertwine with others, [Name] invites imagination to wander, return, and grow.</p>
        </section>

        <section>
            <h2>New Story</h2>
            <button id="new_story">+ New Story</button>

            <div id="new_story_panel" class="new_story_panel" hidden>

                <div id="new_story_panel_content">

                    <div class="field">
                        <label for="story_title">Title</label>
                        <input type="text" id="story_title" value="Untitled" maxlength="64"/>
                    </div>

                    <div class="field">
                        <label for="story_type_group">Mode</label>
                        <div class="story_type_group">
                            <button class="story_type active" id="solo_story">Solo</button>
                            <button class="story_type" id="collaborative_story">Collaborative</button>
                        </div>
                        <label id="username_label" for="username" hidden>Username</label>
                        <input type="text" id="username" name="username" required minlength="1" maxlength="64" hidden/>
                    </div>

                    <div class="field">
                        <label for="genre_select">Genre</label>
                        <select id="genre_select">
                            <option value="">None</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="prompt_type">Prompt</label>
                        <select id="prompt_type">
                            <option value="none">None</option>
                            <option value="template">Template</option>
                            <option value="challenge">Challenge</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button id="cancel_new_story">Cancel</button>
                        <button id="create_new_story">Create</button>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h3>Your Stories</h3>
            <ul id="stories_list"></ul>
        </section>

        <section>
            <h3>Collaborative Stories</h3>
            <ul id="sessions_list"></ul>
        </section>
    </main>

    <script type="module" src="js/home.js"></script>
</body>
</html>
