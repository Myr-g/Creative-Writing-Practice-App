<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <h2 id="story_title"></h2>
        <h3 id="story_prompt"></h3>
        <textarea id="story_editor" rows="10" cols="80" placeholder="You may begin writing..."></textarea>
        <button type="button" id="exit_session">Exit</button>
        <button type="button" id="save_story">Save</button>
        <span id="save_status"></span>
    </section>

    <script src="session.js"></script>
</body>
</html>
